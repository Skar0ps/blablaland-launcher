appId: "com.blablastrae.dev2"

electronLanguages:
  - fr

directories:
  output: "release-dev"
  buildResources: "build"

compression: "store"

files:
  # Mêmes règles que electron-builder.yml : ne PAS exclure node_modules sinon
  # les deps de prod (electron-context-menu) manquent et le require() crashe.
  - "index.js"
  - "preload.js"
  - "package.json"
  - "assets"
  # Icônes utilisées au runtime comme icône de fenêtre (BrowserWindow icon:).
  - "build/icon.png"
  - "build/icon.ico"
  - "!**/*.map"
  - "!**/*.d.ts"
  - "!**/*.md"

extraResources:
  - from: "plugins/${os}/${arch}"
    to: "plugins"
    filter:
      - "**/*"

win:
  target:
    - target: "portable"
      arch:
        - x64
  icon: "build/icon.ico"
