<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        html { background: transparent; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* background-color: rgba(32, 34, 37, 0.95); */
            border-radius: 20px;
            font-family: sans-serif;
            user-select: none;
            -webkit-app-region: drag;
            overflow: hidden;
        }
        img {
            width: 384px;
            height: 384px;
            margin-bottom: 15px;
            opacity: 0;
            transform: scale(1.5) translateZ(0);
            will-change: transform, opacity;
            backface-visibility: hidden;
        }
        body.animate img {
            animation: scale-in 1.0s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes scale-in {
            0%,33% { transform: scale(1.5) translateZ(0); opacity: 0; }
            100% { transform: scale(1) translateZ(0); opacity: 1; }
        }

        body.fade-out img {
            animation: fade-out 0.8s cubic-bezier(0.64, 0, 0.78, 0) forwards;
        }
        @keyframes fade-out {
            0% { transform: scale(1) translateZ(0); opacity: 1; }
            100% { transform: scale(0.5) translateZ(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <img src="splash_blablastrae_shadow.webp" alt="Splash">
    <script>setTimeout(() => document.body.classList.add('animate'), 100);</script>
</body>
</html>
