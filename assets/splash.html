<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        html { background: transparent; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* background-color: rgba(32, 34, 37, 0.95); */
            border-radius: 20px;
            font-family: sans-serif;
            user-select: none;
            -webkit-app-region: drag;
            overflow: hidden;
        }
        img {
            width: 384px;
            height: 384px;
            margin-bottom: 15px;
            filter: drop-shadow(0px 16px 8px #000000);
            
            animation: scale-in 1.0s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes scale-in {
            0% { transform: scale(1.25); opacity: 0; }
            75% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .fade-out {
            animation: fade-out 1.0s cubic-bezier(0.55, 0, 1, 0.45) forwards;
        }
        @keyframes fade-out {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }
    </style>
</head>
<body>
    <img src="splash_blablastrae.png" alt="Splash">
</body>
</html>
