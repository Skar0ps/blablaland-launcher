name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  build_windows_linux:
    name: Build for Windows & Linux
    runs-on: ubuntu-latest
    container:
      image: electronuserland/builder:wine
      options: --user 1001
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Windows (NSIS + Portable) & Linux (AppImage + deb + rpm)
        run: yarn package --win --linux

      - name: Publish Windows & Linux to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build macOS (dmg + zip, Intel x64 + Apple Silicon arm64)
        run: yarn package --mac

      - name: Sign macOS apps (ad-hoc, sans certificat Apple)
        run: |
          for app in release/mac/*.app release/mac-arm64/*.app; do
            if [ -d "$app" ]; then
              echo "Signature ad-hoc de : $app"
              codesign --force --deep --sign - "$app"
            fi
          done

      - name: Publish macOS to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
