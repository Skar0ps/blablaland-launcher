name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  build_windows_linux:
    name: Build for Windows & Linux
    runs-on: ubuntu-latest
    container:
      image: electronuserland/builder:wine
      options: --user 1001
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Windows (NSIS + Portable) & Linux (AppImage + deb + rpm)
        run: yarn package --win --linux

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-builds-windows
          path: |
            release/*.exe

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-builds-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm

  build_macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build macOS (dmg + zip, Intel x64 + Apple Silicon arm64)
        run: yarn package --mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-builds-macos
          path: |
            release/*.dmg
            release/*-mac.zip
            release/*-mac-arm64.zip

  publish:
    name: Publish GitHub Release
    needs: [build_windows_linux, build_macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
