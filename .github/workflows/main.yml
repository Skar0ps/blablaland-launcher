name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  build_windows_linux:
    name: Build for Windows & Linux
    runs-on: ubuntu-latest
    container:
      image: electronuserland/builder:wine
      options: --user 1001
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Windows (NSIS + Portable) & Linux (AppImage + deb + rpm)
        run: yarn package --win --linux

      - name: Publish Windows & Linux to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build macOS app (sans DMG, x64 uniquement)
        run: yarn electron-builder --mac --x64 --dir

      - name: Signature ad-hoc du .app
        run: codesign --force --deep --sign - "release/mac/Blablastrae Launcher.app"

      - name: Package DMG et ZIP à partir du .app signé
        run: |
          yarn electron-builder --mac dmg zip --x64 \
            --prepackaged "release/mac/Blablastrae Launcher.app"

      - name: Publish macOS to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
