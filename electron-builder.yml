appId: "com.blablastrae.desktop"
productName: "Blablastrae"

directories:
  output: "release"

# Optimization: Use maximum compression (LZMA) to reduce the portable exe size
compression: "maximum"

files:
  - "index.js"
  - "package.json"
  - "assets"
  - "!**/*.map"
  - "!**/*.d.ts"
  - "!**/*.md"

extraResources:
  - from: "plugins/${os}/${arch}"
    to: "plugins"
    filter:
      - "**/*"

mac:
  target: "dmg"

win:
  target: "portable"
  icon: "assets/icon.ico"

linux:
  target: "AppImage"

protocols:
  - name: "blablaland"
    schemes:
      - "blablaland-desktop"
