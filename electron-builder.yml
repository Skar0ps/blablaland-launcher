appId: "com.blablastrae.desktop"

# Optimisation : Ne garder que les fichiers de langue française (gagne ~3-5 Mo)
electronLanguages:
  - fr

directories:
  output: "release"
  buildResources: "build"

# Optimization: Use maximum compression (LZMA) to reduce the portable exe size
compression: "maximum"

files:
  # On liste explicitement nos fichiers applicatifs.
  # Les dépendances de prod (ex: electron-context-menu) sont embarquées
  # automatiquement par electron-builder depuis node_modules : il ne FAUT PAS
  # exclure node_modules ici, sinon le require() crashe dans le build packagé.
  - "index.js"
  - "preload.js"
  - "package.json"
  - "assets"
  # Icônes utilisées au runtime comme icône de fenêtre (BrowserWindow icon:).
  # buildResources ne copie PAS build/ dans l'app packagée, il faut l'inclure ici.
  - "build/icon.png"
  - "build/icon.ico"
  - "!**/*.map"
  - "!**/*.d.ts"
  - "!**/*.md"
  - "!LICENSES.chromium.html"

extraResources:
  - from: "plugins/${os}/${arch}"
    to: "plugins"
    filter:
      - "**/*"

mac:
  target:
    - target: "dmg"
      arch:
        - x64
  icon: "build/icon.png"
  # Désactive la signature automatique d'electron-builder (pas de cert Apple Developer)
  # La signature ad-hoc est appliquée manuellement via codesign dans le workflow CI
  identity: null

win:
  icon: "build/icon.ico"
  # Noms d'artefacts normalisés (sans espace) pour des URLs de téléchargement
  # prévisibles côté site (cf. game.blade.php + LAUNCHER_VERSION).
  target:
    - target: "nsis"
      arch:
        - x64
    - target: "portable"
      arch:
        - x64

nsis:
  artifactName: "Blablastrae-Launcher-Setup-${version}.${ext}"

portable:
  artifactName: "Blablastrae-Launcher-Portable-${version}.${ext}"

linux:
  icon: "build/icon.png"
  target:
    - target: "AppImage"
      arch:
        - x64
    - target: "deb"
      arch:
        - x64
    - target: "rpm"
      arch:
        - x64

appImage:
  artifactName: "Blablastrae-Launcher-${version}.${ext}"

deb:
  artifactName: "blablastrae-launcher_${version}_amd64.${ext}"

rpm:
  artifactName: "blablastrae-launcher-${version}.x86_64.${ext}"

protocols:
  - name: "blablastrae"
    schemes:
      - "blablastrae-desktop"
