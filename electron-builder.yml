appId: "com.blablastrae.desktop"

# Optimisation : Ne garder que les fichiers de langue française (gagne ~3-5 Mo)
electronLanguages:
  - fr

directories:
  output: "release"

# Optimization: Use maximum compression (LZMA) to reduce the portable exe size
compression: "maximum"

files:
  - "index.js"
  - "package.json"
  - "assets"
  - "!**/*.map"
  - "!**/*.d.ts"
  - "!**/*.md"

extraResources:
  - from: "plugins/${os}/${arch}"
    to: "plugins"
    filter:
      - "**/*"

mac:
  target:
    - "dmg"
    - "zip"

win:
  target: "portable"
  icon: "assets/icon.ico"
  arch: "x64" # Optimisation : Forcer le 64 bits uniquement (évite le code 32 bits inutile)

linux:
  target: "AppImage"

protocols:
  - name: "blablaland"
    schemes:
      - "blablaland-desktop"
