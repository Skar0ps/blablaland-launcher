appId: "com.blablastrae.desktop"

# Optimisation : Ne garder que les fichiers de langue française (gagne ~3-5 Mo)
electronLanguages:
  - fr

directories:
  output: "release"
  buildResources: "build"

# Optimization: Use maximum compression (LZMA) to reduce the portable exe size
compression: "maximum"

files:
  - "index.js"
  - "package.json"
  - "assets"
  - "!**/*.map"
  - "!**/*.d.ts"
  - "!**/*.md"

extraResources:
  - from: "plugins/${os}/${arch}"
    to: "plugins"
    filter:
      - "**/*"

mac:
  target:
    - target: "dmg"
      arch:
        - x64
        - arm64
    - target: "zip"
      arch:
        - x64
        - arm64
  icon: "build/icon.ico"

win:
  target:
    - target: "nsis"
      arch:
        - x64
        - ia32
    - target: "portable"
      arch:
        - x64
  icon: "build/icon.ico"

linux:
  target:
    - target: "AppImage"
      arch:
        - x64
    - target: "deb"
      arch:
        - x64
    - target: "rpm"
      arch:
        - x64

protocols:
  - name: "blablastrae"
    schemes:
      - "blablastrae-desktop"
