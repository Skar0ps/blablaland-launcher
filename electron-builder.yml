appId: "com.blablastrae.desktop"
productName: "Blablastrae"

directories:
  output: "release"

files:
  - "!plugins/"

extraResources:
  - from: "plugins/${os}/${arch}"
    to: "plugins"
    filter:
      - "**/*"

mac:
  target: "dmg"

win:
  target: "portable"

linux:
  target: "AppImage"

protocols:
  - name: "blablaland"
    schemes:
      - "blablaland-desktop"
